behaviors:
  CarDriverAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 0.0002
      learning_rate_schedule: linear
      beta: 0.005
      beta_schedule: linear
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.01
        learning_rate: 0.0003
    max_steps: 25000000
    time_horizon: 256
    summary_freq: 20000
    checkpoint_interval: 1000000